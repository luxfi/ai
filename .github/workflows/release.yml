name: Release
on:
  push:
    tags:
    - v*
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g., v0.1.0)
        required: true
permissions:
  contents: write
  packages: write
env:
  GO_VERSION: 1.26.3
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    - name: Verify dependencies
      run: go mod verify
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test -v -race ./...
    - name: Lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m
  build-binaries:
    name: Build ${{ matrix.name }}
    needs: build-and-test
    strategy:
      matrix:
        include:
        - goos: linux
          goarch: amd64
          name: lux-ai-linux-amd64
        - goos: linux
          goarch: arm64
          name: lux-ai-linux-arm64
        - goos: darwin
          goarch: amd64
          name: lux-ai-darwin-amd64
        - goos: darwin
          goarch: arm64
          name: lux-ai-darwin-arm64
        - goos: windows
          goarch: amd64
          name: lux-ai-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p dist
        EXT=""
        if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
        go build -ldflags="-s -w" -o dist/lux-ai${EXT} ./cmd/lux-ai
        cd dist
        if [ "${{ matrix.goos }}" = "windows" ]; then
          7z a ../${{ matrix.name }}.zip lux-ai.exe
        else
          tar -czf ../${{ matrix.name }}.tar.gz lux-ai
        fi
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: |
          *.tar.gz
          *.zip
  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    - name: Generate changelog
      run: |
        echo "## What's Changed" > CHANGELOG.md
        git log --pretty=format:"* %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD >> CHANGELOG.md || true
        echo "" >> CHANGELOG.md
        echo "## Features" >> CHANGELOG.md
        echo "- OpenAI-compatible chat API" >> CHANGELOG.md
        echo "- AI mining capabilities" >> CHANGELOG.md
        echo "- Q-Chain integration for attestations" >> CHANGELOG.md
        echo "- Cross-network teleport support (Lux, Hanzo, Zoo)" >> CHANGELOG.md
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/**/*
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
